<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeKILLER AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root { --accent: #00ff88; }
  body { margin:0; font-family:'Inter',sans-serif; background:#0a0a0f; color:#e2e8f0; height:100vh; overflow:hidden; }
  header { padding:16px 24px; background:rgba(10,10,15,0.95); border-bottom:1px solid #1e1e2e; display:flex; justify-content:space-between; align-items:center; }
  .logo { font-size:26px; font-weight:800; }
  .logo span { color:var(--accent); }
  .app { display:flex; height:calc(100vh - 65px); }
  .sidebar { width:260px; background:#111118; border-right:1px solid #1e1e2e; padding:16px; overflow-y:auto; }
  .chat-area { flex:1; display:flex; flex-direction:column; }
  #messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:18px; }
  .message { max-width:80%; }
  .message.user { align-self:flex-end; }
  .bubble { padding:14px 18px; border-radius:12px; line-height:1.6; }
  .message.ai .bubble { background:#1a1a2e; border:1px solid #00ff8833; }
  .message.user .bubble { background:#1e2a1e; border:1px solid var(--accent); }
  .input-area { padding:20px; border-top:1px solid #1e1e2e; }
  .input-wrapper { display:flex; background:#111118; border:1px solid #333; border-radius:16px; padding:10px; }
  #userInput { flex:1; background:transparent; border:none; outline:none; color:white; font-size:15px; }
  button { background:var(--accent); color:black; border:none; padding:10px 16px; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>

<header>
  <div class="logo">Code<span>KILLER</span> AI</div>
  <select id="modelSelect">
    <option value="codemind-ai">CodeKiller AI (Local)</option>
  </select>
</header>

<div class="app">
  <div class="sidebar" id="sidebar"></div>
  
  <div class="chat-area">
    <div id="messages"></div>
    
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Write code, debug, build app..." rows="1"></textarea>
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const API_BASE = "http://localhost:5000/api";
const AUTH_KEY = "sk-CodeKiller2026!YourStrongSecretKey123";   // ← Change this to match .env

let currentChatId = null;
let conversationHistory = [];

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  appendMessage('user', text);
  conversationHistory.push({role: "user", content: text});
  input.value = "";

  const typingId = appendTyping();

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${AUTH_KEY}`
      },
      body: JSON.stringify({
        messages: conversationHistory,
        model: document.getElementById('modelSelect').value,
        chat_id: currentChatId
      })
    });

    removeTyping(typingId);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let aiText = "";

    const aiId = appendStreamingMessage();

    while(true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.delta) {
              aiText += data.delta;
              updateStreaming(aiId, aiText);
            }
          } catch(e){}
        }
      }
    }
    conversationHistory.push({role:"assistant", content: aiText});
  } catch(e) {
    console.error(e);
  }
}

// Basic helper functions (appendMessage, etc.)
function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="bubble">${marked.parse(content)}</div>`;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView();
}

function appendStreamingMessage() {
  const id = 'stream-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'message ai';
  div.innerHTML = `<div class="bubble" id="${id}content"></div>`;
  document.getElementById('messages').appendChild(div);
  return id;
}

function updateStreaming(id, text) {
  const el = document.getElementById(id + 'content');
  if (el) el.innerHTML = marked.parse(text);
}

function appendTyping() { /* simple typing */ return "typing"; }
function removeTyping() { /* remove if needed */ }

function newChat() {
  currentChatId = null;
  conversationHistory = [];
  document.getElementById('messages').innerHTML = "<h2 style='text-align:center;margin-top:80px;color:#666;'>New Chat Started</h2>";
}

// Load chats in sidebar (basic)
async function loadChats() {
  // You can expand this later
  console.log("Chats loaded");
}

loadChats();
</script>
</body>
</html>
